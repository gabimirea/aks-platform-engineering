apiVersion: scaffolder.backstage.io/v1beta3
kind: Template
metadata:
  name: azure-portal-services-pr-template
  title: Azure Portal Services (Storage Account, VM, or AKS)
  description: Create a GitOps pull request to provision Azure services with Crossplane.
  tags:
    - azure
    - gitops
    - infrastructure
spec:
  owner: user:guest
  type: infrastructure

  parameters:
    - title: Request Settings
      required:
        - repoUrl
        - requestName
        - serviceType
        - resourceGroupName
        - costTag
        - location
        - kubernetesNamespace
        - providerConfigName
      properties:
        repoUrl:
          title: Target Repository
          type: string
          description: Repository that Argo CD syncs from.
          default: github.com?owner=gabimirea&repo=aks-platform-engineering
          ui:field: RepoUrlPicker
          ui:options:
            allowedHosts:
              - github.com
            allowedOwners:
              - gabimirea
            allowedRepos:
              - aks-platform-engineering
        requestName:
          title: Request Name
          type: string
          description: Folder name for this request under portal-services/instances.
          pattern: '^[a-z0-9-]+$'
          ui:help: Lowercase letters, numbers, and hyphens only.
        serviceType:
          title: Portal Service Type
          type: string
          enum:
            - storage-account
            - virtual-machine
            - aks-cluster
          default: storage-account
        resourceGroupName:
          title: Azure Resource Group
          type: string
          pattern: '^[a-zA-Z0-9._()\\-]+$'
        costTag:
          title: COST Tag Value
          type: string
          default: T3
          pattern: '^[a-zA-Z0-9._()\\-]+$'
          description: Required by Azure Policy on resource groups.
        location:
          title: Azure Location
          type: string
          default: swedencentral
        kubernetesNamespace:
          title: Kubernetes Namespace
          type: string
          default: default
        providerConfigName:
          title: Crossplane ProviderConfig Name
          type: string
          default: default
          description: ProviderConfig name for Azure Crossplane provider.
      dependencies:
        serviceType:
          oneOf:
            - properties:
                serviceType:
                  enum:
                    - storage-account
                storageAccountBaseName:
                  title: Storage Account Base Name
                  type: string
                  pattern: '^[a-z0-9]{3,18}$'
                  ui:help: 3-18 lowercase letters or numbers.
                storageRandomCode:
                  title: Storage Random Code
                  type: string
                  pattern: '^[a-z0-9]{4,6}$'
                  ui:help: Add a 4-6 char random suffix, lowercase letters or numbers.
                storageAccountTier:
                  title: Storage Account Tier
                  type: string
                  enum:
                    - Standard
                    - Premium
                  default: Standard
                storageReplicationType:
                  title: Storage Replication Type
                  type: string
                  enum:
                    - LRS
                    - GRS
                    - RAGRS
                    - ZRS
                  default: LRS
              required:
                - storageAccountBaseName
                - storageRandomCode
            - properties:
                serviceType:
                  enum:
                    - virtual-machine
                vmName:
                  title: VM Name
                  type: string
                  pattern: '^[a-zA-Z0-9-]{1,64}$'
                vmSize:
                  title: VM Size
                  type: string
                  default: Standard_B2s
                vmAdminUsername:
                  title: VM Admin Username
                  type: string
                  default: azureuser
                vmAdminPassword:
                  title: VM Admin Password
                  type: string
                  ui:field: Secret
                  minLength: 6
                  maxLength: 72
                  pattern: '^.{6,72}$'
                  description: Demo only. Consider using Key Vault + External Secrets for production.
                  ui:help: 6-72 chars, include uppercase, lowercase, number, and special character.
              required:
                - vmName
                - vmAdminPassword
            - properties:
                serviceType:
                  enum:
                    - aks-cluster
                aksClusterName:
                  title: AKS Cluster Name
                  type: string
                  pattern: '^[a-z0-9-]{3,63}$'
                  ui:help: 3-63 lowercase letters, numbers, or hyphens.
                aksAdminObjectId:
                  title: AKS Admin Object ID
                  type: string
                  pattern: '^[0-9a-fA-F-]{36}$'
                  ui:help: Microsoft Entra object ID used for AKS RBAC and role assignment.
                aksKubernetesVersion:
                  title: AKS Kubernetes Version
                  type: string
                  default: "1.29.9"
                aksSystemNodeSize:
                  title: AKS System Node VM Size
                  type: string
                  default: Standard_D2s_v3
                aksSystemMinCount:
                  title: AKS System Node Min Count
                  type: integer
                  default: 1
                  minimum: 1
                aksSystemMaxCount:
                  title: AKS System Node Max Count
                  type: integer
                  default: 3
                  minimum: 1
                aksUserNodeSize:
                  title: AKS User Node VM Size
                  type: string
                  default: Standard_B2s
                aksUserMinCount:
                  title: AKS User Node Min Count
                  type: integer
                  default: 1
                  minimum: 1
                aksUserMaxCount:
                  title: AKS User Node Max Count
                  type: integer
                  default: 3
                  minimum: 1
              required:
                - aksClusterName
                - aksAdminObjectId

  steps:
    - id: generate-storage
      name: Generate Storage Account Manifests (If Selected)
      if: ${{ parameters.serviceType == 'storage-account' }}
      action: fetch:template
      input:
        url: ./content/storage-account
        targetPath: ./out
        values:
          requestName: ${{ parameters.requestName }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          costTag: ${{ parameters.costTag }}
          location: ${{ parameters.location }}
          kubernetesNamespace: ${{ parameters.kubernetesNamespace }}
          providerConfigName: ${{ parameters.providerConfigName }}
          storageAccountName: ${{ parameters.storageAccountBaseName + parameters.storageRandomCode }}
          storageAccountTier: ${{ parameters.storageAccountTier }}
          storageReplicationType: ${{ parameters.storageReplicationType }}

    - id: generate-vm
      name: Generate Virtual Machine Manifests (If Selected)
      if: ${{ parameters.serviceType == 'virtual-machine' }}
      action: fetch:template
      input:
        url: ./content/virtual-machine
        targetPath: ./out
        values:
          requestName: ${{ parameters.requestName }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          costTag: ${{ parameters.costTag }}
          location: ${{ parameters.location }}
          kubernetesNamespace: ${{ parameters.kubernetesNamespace }}
          providerConfigName: ${{ parameters.providerConfigName }}
          vmName: ${{ parameters.vmName }}
          vmSize: ${{ parameters.vmSize }}
          vmAdminUsername: ${{ parameters.vmAdminUsername }}
          vmAdminPassword: ${{ parameters.vmAdminPassword }}

    - id: generate-aks
      name: Generate AKS Manifests (If Selected)
      if: ${{ parameters.serviceType == 'aks-cluster' }}
      action: fetch:template
      input:
        url: ./content/aks-cluster
        targetPath: ./out
        values:
          requestName: ${{ parameters.requestName }}
          resourceGroupName: ${{ parameters.resourceGroupName }}
          costTag: ${{ parameters.costTag }}
          location: ${{ parameters.location }}
          kubernetesNamespace: ${{ parameters.kubernetesNamespace }}
          providerConfigName: ${{ parameters.providerConfigName }}
          aksClusterName: ${{ parameters.aksClusterName }}
          aksAdminObjectId: ${{ parameters.aksAdminObjectId }}
          aksKubernetesVersion: ${{ parameters.aksKubernetesVersion }}
          aksSystemNodeSize: ${{ parameters.aksSystemNodeSize }}
          aksSystemMinCount: ${{ parameters.aksSystemMinCount }}
          aksSystemMaxCount: ${{ parameters.aksSystemMaxCount }}
          aksUserNodeSize: ${{ parameters.aksUserNodeSize }}
          aksUserMinCount: ${{ parameters.aksUserMinCount }}
          aksUserMaxCount: ${{ parameters.aksUserMaxCount }}

    - id: create-pr
      name: Create Pull Request
      action: publish:github:pull-request
      input:
        repoUrl: ${{ parameters.repoUrl }}
        branchName: backstage-portal-${{ parameters.requestName }}
        title: "feat(infra): add ${{ parameters.serviceType }} request '${{ parameters.requestName }}'"
        description: |
          Backstage-generated portal service request.

          - Service type: `${{ parameters.serviceType }}`
          - Request name: `${{ parameters.requestName }}`
          - Azure location: `${{ parameters.location }}`
          - Resource group: `${{ parameters.resourceGroupName }}`
        sourcePath: ./out
        targetPath: gitops/apps/infra/portal-services/instances/${{ parameters.requestName }}
        update: true
        commitMessage: "feat(infra): add portal service request ${{ parameters.requestName }}"

  output:
    links:
      - title: Pull Request
        url: ${{ steps['create-pr'].output.remoteUrl }}

