apiVersion: kubernetes.example.com/v1alpha1
kind: VMClaim
metadata:
  name: ${{ values.vmName }}
  annotations:
    crossplane.io/external-name: ${{ values.vmName }}
    argocd.argoproj.io/sync-wave: "3"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  location: ${{ values.location }}
  adminUsername: ${{ values.vmAdminUsername }}
  sshPublicKey: ${{ values.vmSshPublicKey }}
  vmSize: ${{ values.vmSize }}
  image:
    publisher: Canonical
    offer: 0001-com-ubuntu-server-jammy
    sku: 22_04-lts
    version: latest
  osDisk:
    storageAccountType: Standard_LRS
    diskSizeGb: 30
  network:
    vnetAddressSpace:
      - 10.20.0.0/16
    subnetPrefix: 10.20.1.0/24
    privateIpAddressAllocation: Dynamic
    publicIpAllocationMethod: Static
  tags:
    COST: ${{ values.costTag }}
    request: ${{ values.requestName }}
