apiVersion: network.azure.com/v1api20201101
kind: NetworkSecurityGroupsSecurityRule
metadata:
  name: ${{ values.vmName }}-nsg-allow-ssh
  namespace: ${{ values.kubernetesNamespace }}
  labels:
    platform.demo/request: ${{ values.requestName }}
spec:
  owner:
    name: ${{ values.vmName }}-nsg
  protocol: Tcp
  sourcePortRange: "*"
  destinationPortRange: "22"
  sourceAddressPrefix: "*"
  destinationAddressPrefix: "*"
  access: Allow
  priority: 101
  direction: Inbound
  description: Allow SSH from any source (demo only).
