apiVersion: network.azure.upbound.io/v1beta1
kind: NetworkInterfaceSecurityGroupAssociation
metadata:
  name: vm-sdc-001-nic-nsg-assoc
  namespace: default
  labels:
    platform.demo/request: create-vm
spec:
  forProvider:
    networkInterfaceIdSelector:
      matchLabels:
        platform.demo/request: create-vm
        platform.demo/component: vm-sdc-001-nic
    networkSecurityGroupIdSelector:
      matchLabels:
        platform.demo/request: create-vm
        platform.demo/component: vm-sdc-001-nsg
  providerConfigRef:
    name: default
