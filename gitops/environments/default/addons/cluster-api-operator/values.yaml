core: "cluster-api:v1.9.6"
infrastructure: "azure:v1.19.2"
addon: "helm:v0.3.1"
enableHelmHook: false
manager:
  featureGates:
    core:
      ClusterTopology: true
additionalDeployments:
  azureserviceoperator-controller-manager:
    deployment:
      containers:
      - name: manager
        env:
          - name: AZURE_FEDERATED_TOKEN_FILE
            value: /var/run/secrets/tokens/azure-identity
        args:
          --crd-pattern: "documentdb.azure.com/*;managedidentity.azure.com/*;keyvault.azure.com/*;resources.azure.com/*;apimanagement.azure.com/*;storage.azure.com/*;network.azure.com/*;compute.azure.com/*"
